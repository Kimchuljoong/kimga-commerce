
spring:
  application:
    name: routing-gateway

  cloud:
    gateway:
      routes:
        - id: member-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/member/**
            - Path=/api/v1/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/product/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**
            - Path=/api/v1/stock/**



